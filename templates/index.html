<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stegano Vault Pro</title>
    <style>
        :root { --accent: #00d4ff; --bg: #0f0f0f; --card: #1a1a1a; --error: #ff4d4d; }
        
        body { 
            background: var(--bg); 
            color: #e0e0e0; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            margin: 0; 
            padding: 20px; /* Padding pre mobilné zariadenia */
            box-sizing: border-box;
        }

        /* Flexibilná navigácia */
        .nav-container { 
            display: flex; 
            align-items: center; 
            justify-content: center;
            gap: 20px; 
            margin-bottom: 30px; 
            font-size: 1.5rem; 
            font-weight: 800; 
            width: 100%;
        }
        
        .nav-btn { 
            cursor: pointer; 
            color: #444; 
            transition: 0.3s; 
            letter-spacing: 2px; 
            white-space: nowrap;
        }
        
        .nav-btn.active { color: var(--accent); text-shadow: 0 0 15px var(--accent); }

        /* Responzívna karta */
        .card { 
            background: var(--card); 
            padding: 25px; 
            border-radius: 20px; 
            width: 100%; 
            max-width: 450px; /* Maximálna šírka na PC */
            display: none; 
            border: 1px solid #333; 
            box-sizing: border-box;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        
        .card.active { display: block; animation: slideUp 0.4s ease-out; }

        @keyframes slideUp { 
            from { opacity: 0; transform: translateY(15px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        label { display: block; margin-bottom: 5px; margin-top: 15px; }

        input, textarea { 
            width: 100%; 
            background: #252525; 
            border: 1px solid #333; 
            color: white; 
            padding: 14px; 
            margin: 5px 0; 
            border-radius: 10px; 
            box-sizing: border-box; 
            font-size: 16px; /* 16px bráni automatickému zoomovaniu na iPhone */
        }
        
        button { 
            width: 100%; 
            padding: 16px; 
            border: none; 
            border-radius: 10px; 
            background: var(--accent); 
            color: #000; 
            font-weight: bold; 
            cursor: pointer; 
            margin-top: 20px; 
            transition: 0.2s; 
            font-size: 1rem;
            text-transform: uppercase;
        }
        
        button:hover { filter: brightness(1.1); }
        button:active { transform: scale(0.98); }

        .error-msg { color: var(--error); font-size: 0.9rem; margin-top: 10px; display: none; text-align: center; font-weight: bold; }

        #decrypt-result-area { margin-top: 20px; border-top: 1px solid #333; padding-top: 20px; display: none; }
        .copy-btn { background: #333; color: var(--accent); border: 1px solid var(--accent); margin-top: 10px; font-size: 0.85rem; }

        #loading { 
            display: none; 
            position: fixed; 
            top: 20px; 
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            color: var(--accent); 
            font-weight: bold; 
            background: #000; 
            padding: 12px 25px; 
            border-radius: 30px; 
            border: 1px solid var(--accent);
            box-shadow: 0 0 15px var(--accent);
        }

        /* Úpravy pre malé obrazovky (telefóny) */
        @media (max-width: 480px) {
            .nav-container { font-size: 1.2rem; gap: 15px; }
            .card { padding: 20px; }
            body { justify-content: flex-start; padding-top: 50px; }
            .nav-btn { letter-spacing: 1px; }
        }
    </style>
</head>
<body>

    <div id="loading">Spracovávam...</div>

    <div class="nav-container">
        <div id="btn-hide" class="nav-btn active" onclick="showTab('hide')">HIDE</div>
        <div style="color:#333">|</div>
        <div id="btn-unhide" class="nav-btn" onclick="showTab('unhide')">UNHIDE</div>
    </div>

    <div id="section-hide" class="card active">
        <form id="form-hide">
            <label style="font-size: 0.8rem; color: #888;">1. Vyber obrázok</label>
            <input type="file" name="image" accept="image/*" required>
            <label style="font-size: 0.8rem; color: #888;">2. Tajná správa</label>
            <textarea name="text" rows="4" placeholder="Sem vlož text..." required></textarea>
            <input type="password" name="password" placeholder="Bezpečnostné heslo" required>
            <button type="submit">ZAKÓDOVAŤ A STIAHNUŤ</button>
        </form>
    </div>

    <div id="section-unhide" class="card">
        <form id="form-unhide">
            <label style="font-size: 0.8rem; color: #888;">Nahraj stego-obrázok</label>
            <input type="file" name="image" accept="image/*" required>
            <div id="error-unhide" class="error-msg"></div>
            <input type="password" name="password" placeholder="Heslo" required>
            <button type="submit">DEŠIFROVAŤ</button>
        </form>

        <div id="decrypt-result-area">
            <label style="font-size: 0.8rem; color: #2ecc71;">Nájdená správa:</label>
            <textarea id="output-text" rows="5" readonly></textarea>
            <button class="copy-btn" onclick="copyText()">KOPÍROVAŤ TEXT</button>
        </div>
    </div>

    <script>
        // JS logika zostáva rovnaká, len pridaná lepšia podpora pre mobilné kopírovanie
        function showTab(tab) {
            document.querySelectorAll('.card, .nav-btn').forEach(el => el.classList.remove('active'));
            document.getElementById('section-' + tab).classList.add('active');
            document.getElementById('btn-' + tab).classList.add('active');
            document.getElementById('decrypt-result-area').style.display = 'none';
            document.getElementById('error-unhide').style.display = 'none';
        }

        document.getElementById('form-hide').onsubmit = async (e) => {
            e.preventDefault();
            document.getElementById('loading').style.display = 'block';
            const formData = new FormData(e.target);
            try {
                const resp = await fetch('/encrypt', { method: 'POST', body: formData });
                if (resp.ok) {
                    const blob = await resp.blob();
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url; a.download = "stego_output.jpg"; 
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                } else {
                    alert("Chyba pri šifrovaní.");
                }
            } catch(e) {
                alert("Server neodpovedá.");
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        };

        document.getElementById('form-unhide').onsubmit = async (e) => {
            e.preventDefault();
            const errDiv = document.getElementById('error-unhide');
            const resArea = document.getElementById('decrypt-result-area');
            const outputText = document.getElementById('output-text');
            const loader = document.getElementById('loading');

            errDiv.style.display = 'none';
            resArea.style.display = 'none';
            loader.style.display = 'block';

            const formData = new FormData(e.target);
            try {
                const resp = await fetch('/decrypt', { method: 'POST', body: formData });
                const data = await resp.json();

                if (data.success) {
                    const decodedText = decodeURIComponent(escape(atob(data.base64_data)));
                    outputText.value = decodedText;
                    resArea.style.display = 'block';
                } else {
                    errDiv.innerText = data.error;
                    errDiv.style.display = 'block';
                }
            } catch (e) {
                errDiv.innerText = "Chyba spojenia.";
                errDiv.style.display = 'block';
            } finally {
                loader.style.display = 'none';
            }
        };

        function copyText() {
            const copyText = document.getElementById("output-text");
            copyText.select();
            copyText.setSelectionRange(0, 99999); // Pre mobilné zariadenia
            navigator.clipboard.writeText(copyText.value).then(() => {
                alert("Text skopírovaný!");
            });
        }
    </script>
</body>
</html>
