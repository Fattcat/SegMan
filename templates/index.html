<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stegano Vault Pro v2</title>
    <style>
        :root { --accent: #00d4ff; --bg: #0f0f0f; --card: #1a1a1a; --error: #ff4d4d; --success: #2ecc71; }
        
        body { 
            background: var(--bg); color: #e0e0e0; font-family: 'Segoe UI', sans-serif; 
            min-height: 100vh; display: flex; flex-direction: column; align-items: center; 
            margin: 0; padding: 20px; box-sizing: border-box; 
        }

        .nav-container { display: flex; gap: 25px; margin-bottom: 30px; font-size: 1.4rem; font-weight: 800; }
        .nav-btn { cursor: pointer; color: #444; transition: 0.3s; letter-spacing: 1px; }
        .nav-btn.active { color: var(--accent); text-shadow: 0 0 15px var(--accent); }

        .card { 
            background: var(--card); padding: 25px; border-radius: 20px; width: 100%; 
            max-width: 500px; display: none; border: 1px solid #333; box-sizing: border-box;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .card.active { display: block; animation: fadeIn 0.4s ease; }

        /* Drag & Drop */
        .drop-zone { 
            border: 2px dashed #444; border-radius: 15px; padding: 25px; 
            text-align: center; transition: 0.3s; cursor: pointer; 
            margin-bottom: 15px; background: #151515; position: relative;
        }
        .drop-zone.hover { border-color: var(--accent); background: #1a2a2f; }
        .drop-zone img { max-width: 100%; max-height: 180px; border-radius: 10px; margin-top: 10px; display: none; margin-left: auto; margin-right: auto; }
        
        /* Password Field s Okom */
        .password-wrapper { position: relative; width: 100%; margin: 10px 0; }
        .password-wrapper input { padding-right: 45px; margin: 0; }
        .toggle-password { 
            position: absolute; right: 15px; top: 50%; transform: translateY(-50%); 
            cursor: pointer; color: #888; font-size: 1.2rem; z-index: 5;
        }

        /* Indikátor hesla */
        .strength-meter { height: 4px; width: 100%; background: #333; margin-bottom: 15px; border-radius: 2px; overflow: hidden; }
        .strength-bar { height: 100%; width: 0%; transition: 0.4s; }

        /* Kapacita */
        .capacity-info { font-size: 0.75rem; color: #888; text-align: right; margin-top: -10px; margin-bottom: 5px; }

        input, textarea { 
            width: 100%; background: #252525; border: 1px solid #333; color: white; 
            padding: 14px; margin: 10px 0; border-radius: 10px; box-sizing: border-box; font-size: 16px; 
        }
        
        button { 
            width: 100%; padding: 16px; border: none; border-radius: 10px; 
            background: var(--accent); color: #000; font-weight: bold; 
            cursor: pointer; margin-top: 10px; transition: 0.2s; text-transform: uppercase;
        }
        button:hover { filter: brightness(1.1); transform: translateY(-1px); }

        #loading { 
            display: none; position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            color: var(--accent); background: #000; padding: 10px 25px; 
            border-radius: 30px; border: 1px solid var(--accent); z-index: 1000; 
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="loading">Spracovávam...</div>

    <div class="nav-container">
        <div id="btn-hide" class="nav-btn active" onclick="showTab('hide')">HIDE</div>
        <div style="color:#333">|</div>
        <div id="btn-unhide" class="nav-btn" onclick="showTab('unhide')">UNHIDE</div>
    </div>

    <div id="section-hide" class="card active">
        <form id="form-hide">
            <div class="drop-zone" id="drop-zone-hide">
                <span class="drop-text">Klikni alebo potiahni obrázok / WAV</span>
                <input type="file" name="image" id="file-hide" accept="image/*,audio/wav" style="display:none" required>
                <img id="preview-hide">
                <div id="audio-label-hide" style="display:none; color: var(--accent); margin-top:10px;">🎵 Audio súbor načítaný</div>
            </div>

            <div class="capacity-info" id="cap-info">Kapacita: --</div>
            <textarea name="text" id="secret-text" rows="4" placeholder="Tvoja tajná správa..." required></textarea>
            
            <div class="password-wrapper">
                <input type="password" name="password" id="pass-hide" placeholder="Heslo pre zašifrovanie" required>
                <span class="toggle-password" onclick="togglePass('pass-hide', this)">👁️</span>
            </div>
            <div class="strength-meter"><div id="strength-bar" class="strength-bar"></div></div>

            <button type="submit">ZAKÓDOVAŤ A STIAHNUŤ</button>
        </form>
    </div>

    <div id="section-unhide" class="card">
        <form id="form-unhide">
            <div class="drop-zone" id="drop-zone-unhide">
                <span class="drop-text">Nahraj stego-súbor</span>
                <input type="file" name="image" id="file-unhide" accept="image/*,audio/wav" style="display:none" required>
                <img id="preview-unhide">
            </div>

            <div class="password-wrapper">
                <input type="password" name="password" id="pass-unhide" placeholder="Heslo pre dešifrovanie" required>
                <span class="toggle-password" onclick="togglePass('pass-unhide', this)">👁️</span>
            </div>
            
            <button type="submit">DEŠIFROVAŤ</button>
        </form>

        <div id="decrypt-result-area" style="display:none; margin-top:20px; border-top:1px solid #333; padding-top:15px;">
            <label style="font-size:0.8rem; color:var(--success)">Nájdená správa:</label>
            <textarea id="output-text" rows="5" readonly></textarea>
            <button style="background:#333; color:var(--accent); border: 1px solid var(--accent)" onclick="copyText()">KOPÍROVAŤ TEXT</button>
        </div>
    </div>

    <script>
        // Prepínanie tabov
        function showTab(t) {
            document.querySelectorAll('.card, .nav-btn').forEach(e => e.classList.remove('active'));
            document.getElementById('section-'+t).classList.add('active');
            document.getElementById('btn-'+t).classList.add('active');
        }

        // Prepínanie viditeľnosti hesla
        function togglePass(id, el) {
            const input = document.getElementById(id);
            if (input.type === "password") {
                input.type = "text";
                el.innerText = "🔒";
            } else {
                input.type = "password";
                el.innerText = "👁️";
            }
        }

        // Setup Drag & Drop
        function setupDrop(zoneId, inputId, previewId, audioId) {
            const zone = document.getElementById(zoneId);
            const input = document.getElementById(inputId);
            const preview = document.getElementById(previewId);
            const audioLbl = audioId ? document.getElementById(audioId) : null;

            zone.onclick = () => input.click();
            zone.ondragover = (e) => { e.preventDefault(); zone.classList.add('hover'); };
            zone.ondragleave = () => zone.classList.remove('hover');
            zone.ondrop = (e) => {
                e.preventDefault();
                zone.classList.remove('hover');
                input.files = e.dataTransfer.files;
                handleFile(input.files[0], preview, zone, audioLbl);
            };
            input.onchange = () => handleFile(input.files[0], preview, zone, audioLbl);
        }

        function handleFile(file, preview, zone, audioLbl) {
            if (!file) return;

            // Kapacita (cca 10% veľkosti súboru)
            if(document.getElementById('cap-info')) {
                const kb = Math.floor(file.size * 0.1 / 1024);
                document.getElementById('cap-info').innerText = `Odhadovaná kapacita: ~${kb} KB`;
            }

            if (file.type.startsWith('image/')) {
                const reader = new FileReader();
                reader.onload = (e) => { 
                    preview.src = e.target.result; 
                    preview.style.display = 'block'; 
                    if(audioLbl) audioLbl.style.display = 'none';
                };
                reader.readAsDataURL(file);
            } else {
                preview.style.display = 'none';
                if(audioLbl) audioLbl.style.display = 'block';
            }
            zone.querySelector('.drop-text').innerText = file.name;
        }

        setupDrop('drop-zone-hide', 'file-hide', 'preview-hide', 'audio-label-hide');
        setupDrop('drop-zone-unhide', 'file-unhide', 'preview-unhide', null);

        // Sila hesla
        document.getElementById('pass-hide').oninput = function() {
            let val = this.value;
            let bar = document.getElementById('strength-bar');
            let score = 0;
            if (val.length > 7) score += 30;
            if (/[A-Z]/.test(val)) score += 20;
            if (/[0-9]/.test(val)) score += 20;
            if (/[^A-Za-z0-9]/.test(val)) score += 30;
            bar.style.width = score + '%';
            bar.style.background = score < 40 ? '#ff4d4d' : score < 80 ? '#ffa500' : '#2ecc71';
        };

        // Form Submit Logika
        document.getElementById('form-hide').onsubmit = async (e) => {
            e.preventDefault();
            document.getElementById('loading').style.display = 'block';
            try {
                const resp = await fetch('/encrypt', { method: 'POST', body: new FormData(e.target) });
                if (resp.ok) {
                    const blob = await resp.blob();
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url; a.download = "vault_" + Date.now() + (document.getElementById('file-hide').files[0].name.endsWith('.wav') ? '.wav' : '.jpg');
                    a.click();
                } else { alert("Chyba pri spracovaní."); }
            } catch(err) { alert("Chyba spojenia."); }
            finally { document.getElementById('loading').style.display = 'none'; }
        };

        document.getElementById('form-unhide').onsubmit = async (e) => {
            e.preventDefault();
            document.getElementById('loading').style.display = 'block';
            const resp = await fetch('/decrypt', { method: 'POST', body: new FormData(e.target) });
            const data = await resp.json();
            document.getElementById('loading').style.display = 'none';
            if (data.success) {
                document.getElementById('output-text').value = decodeURIComponent(escape(atob(data.base64_data)));
                document.getElementById('decrypt-result-area').style.display = 'block';
            } else { alert(data.error); }
        };

        function copyText() {
            navigator.clipboard.writeText(document.getElementById('output-text').value);
            alert("Text bol skopírovaný!");
        }
    </script>
</body>
</html>
